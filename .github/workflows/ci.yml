name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: omnisight
          POSTGRES_PASSWORD: omnisight
          POSTGRES_DB: omnisight
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U omnisight"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: postgresql+psycopg2://omnisight:omnisight@localhost:5432/omnisight
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src tests scripts
      - run: ruff format --check src tests scripts
      - run: mypy src
      - run: python scripts/sync_domain_constants.py
      - run: python scripts/sync_schema_versions.py
      - run: python scripts/deploy_db.py --seed
      - run: pytest tests/ -q --cov=src --cov-report=term-missing:skip-covered --cov-fail-under=70

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: pip install -e "../api[dev]"
      - run: python ../api/scripts/sync_domain_constants.py
      - run: python ../api/scripts/sync_schema_versions.py
      - run: npm run codegen:api
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: omnisight
          POSTGRES_PASSWORD: omnisight
          POSTGRES_DB: omnisight
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U omnisight"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/web
    env:
      DATABASE_URL: postgresql+psycopg2://omnisight:omnisight@localhost:5432/omnisight
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: pip install -e "../api[dev]"
      - run: python ../api/scripts/deploy_db.py --seed
      - run: npm ci
      - run: python ../api/scripts/sync_domain_constants.py
      - run: python ../api/scripts/sync_schema_versions.py
      - run: npm run codegen:api
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: "true"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: false
          tags: omnisight-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: omnisight-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Validate Docker Compose configs
        run: |
          cd docker
          cat > .env.ci <<'EOF'
          POSTGRES_USER=omnisight
          POSTGRES_PASSWORD=ci-test-password-32chars-long
          POSTGRES_DB=omnisight
          SECRET_KEY=ci-test-secret-key-32chars-minimum
          API_KEY=ci-test-api-key-24chars-min
          WEBHOOK_SECRET=ci-test-webhook-secret-24ch
          ADMIN_INITIAL_PASSWORD=ci-admin-pass-12
          CORS_ORIGINS=http://localhost:8080
          EOF
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.dev.yml --env-file .env.ci config --quiet
          docker compose -f docker-compose.prod.yml --env-file .env.ci config --quiet
