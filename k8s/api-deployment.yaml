apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnisight-api
  namespace: omnisight
spec:
  replicas: 2
  selector:
    matchLabels:
      app: omnisight-api
  template:
    metadata:
      labels:
        app: omnisight-api
    spec:
      containers:
        - name: api
          image: omnisight-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: omnisight-api-secrets
            - configMapRef:
                name: omnisight-config
          env:
            - name: APP_ENV
              value: production
            - name: BACKGROUND_TASKS_ENABLED
              value: "false"
            - name: WEBHOOK_SYNC_DELIVERY
              value: "false"
            - name: ENSURE_SCHEMA_ON_START
              value: "false"
            - name: CACHE_ENABLED
              value: "true"
            - name: DATABASE_ASYNC_ENABLED
              value: "true"
            - name: UVICORN_WORKERS
              value: "2"
            - name: DATABASE_POOL_SIZE
              value: "3"
            - name: DATABASE_MAX_OVERFLOW
              value: "5"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: omnisight-api
  namespace: omnisight
spec:
  selector:
    app: omnisight-api
  ports:
    - port: 8000
      targetPort: 8000
