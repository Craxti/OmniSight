apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omnisight-api
  namespace: omnisight
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: omnisight-api
  minReplicas: 2
  # Cap aligned with pool sizing in omnisight-config (max ~128 DB conns at ceiling).
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
