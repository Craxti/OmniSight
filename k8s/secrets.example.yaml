apiVersion: v1
kind: Secret
metadata:
  name: omnisight-api-secrets
  namespace: omnisight
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg2://omnisight:CHANGE_ME@postgres:5432/omnisight
  # Optional read replica (async reads). Omit to use DATABASE_URL for all traffic.
  # DATABASE_READ_URL: postgresql+asyncpg://omnisight:CHANGE_ME@postgres-replica:5432/omnisight
  REDIS_URL: redis://omnisight-redis:6379/0
  SECRET_KEY: CHANGE_ME_32_CHARS_MINIMUM________
  API_KEY: CHANGE_ME_API_KEY________________
  WEBHOOK_SECRET: CHANGE_ME_WEBHOOK_SECRET________
  ADMIN_INITIAL_PASSWORD: ChangeMeAdmin12
