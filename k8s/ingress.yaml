apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omnisight
  namespace: omnisight
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: omnisight.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: omnisight-api
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: omnisight-api
                port:
                  number: 8000
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: omnisight-api
                port:
                  number: 8000
          - path: /redoc
            pathType: Prefix
            backend:
              service:
                name: omnisight-api
                port:
                  number: 8000
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: omnisight-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omnisight-web
                port:
                  number: 80
