apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnisight-redis
  namespace: omnisight
spec:
  replicas: 1
  selector:
    matchLabels:
      app: omnisight-redis
  template:
    metadata:
      labels:
        app: omnisight-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: omnisight-redis
  namespace: omnisight
spec:
  selector:
    app: omnisight-redis
  ports:
    - port: 6379
      targetPort: 6379
