# Полный стек для разработки и демо: PostgreSQL + API + Web (Nginx)
# Запуск: docker compose -f docker-compose.dev.yml up -d --build
# Остановка: docker compose -f docker-compose.dev.yml down

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omnisight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omnisight}
      POSTGRES_DB: ${POSTGRES_DB:-omnisight}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omnisight} -d ${POSTGRES_DB:-omnisight}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      LOG_JSON: "false"
      DOCS_ENABLED: "true"
      CACHE_ENABLED: "false"
      DATABASE_ASYNC_ENABLED: "true"
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-omnisight}:${POSTGRES_PASSWORD:-omnisight}@postgres:5432/${POSTGRES_DB:-omnisight}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-development-only}
      API_KEY: ${API_KEY:-omnisight-api-key-dev}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-omnisight-webhook-secret-dev}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}
      SEED_ON_START: ${SEED_ON_START:-1}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
