services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omnisight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-omnisight}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omnisight} -d ${POSTGRES_DB:-omnisight}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      LOG_JSON: "true"
      DOCS_ENABLED: "true"
      CACHE_ENABLED: "false"
      DATABASE_ASYNC_ENABLED: "true"
      BACKGROUND_TASKS_ENABLED: "false"
      WEBHOOK_SYNC_DELIVERY: "false"
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-omnisight}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-omnisight}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      API_KEY: ${API_KEY:?set API_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?set WEBHOOK_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:?set ADMIN_INITIAL_PASSWORD}
      SEED_ON_START: ${SEED_ON_START:-1}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-300}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    command: ["python", "-m", "src.worker"]
    environment:
      APP_ENV: production
      LOG_JSON: "true"
      BACKGROUND_TASKS_ENABLED: "true"
      AUTO_SYNC_SCHEDULER_ENABLED: ${AUTO_SYNC_SCHEDULER_ENABLED:-true}
      AUTO_SYNC_INTERVAL_SECONDS: ${AUTO_SYNC_INTERVAL_SECONDS:-300}
      WEBHOOK_SYNC_DELIVERY: "false"
      DATABASE_ASYNC_ENABLED: "true"
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-omnisight}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-omnisight}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      API_KEY: ${API_KEY:?set API_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?set WEBHOOK_SECRET}
      INTEGRATION_USER_EMAIL: ${INTEGRATION_USER_EMAIL:-integration@omnisight.local}

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
